<div class="min-h-screen flex flex-col bg-base-200 transition-colors duration-300">
  <!-- Header -->
  <header
    class="sticky top-0 z-50 bg-base-100/80 backdrop-blur-md border-b border-base-content/5 shadow-sm transition-colors duration-300"
  >
    <div class="max-w-6xl mx-auto flex items-center justify-between px-4 sm:px-6 py-3">
      <div class="flex items-center gap-3">
        <!-- Colombian flag colors as decorative bar -->
        <div class="flex flex-col gap-0.5 w-6">
          <div class="h-1.5 rounded-full bg-[oklch(82%_0.189_84.429)]"></div>
          <div class="h-1.5 rounded-full bg-[oklch(40%_0.15_237.323)]"></div>
          <div class="h-1.5 rounded-full bg-[oklch(55%_0.19_22.216)]"></div>
        </div>
        <div>
          <h1 class="text-sm sm:text-lg font-black text-base-content tracking-tight leading-tight">
            Festivos Colombianos
          </h1>
          <p class="text-[10px] sm:text-xs font-semibold text-base-content/40 uppercase tracking-widest leading-tight">
            Calendario oficial
          </p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button
          (click)="theme.toggle()"
          class="btn btn-circle btn-sm btn-ghost hover:bg-base-200 transition-all duration-300"
          [attr.aria-label]="'Cambiar a modo ' + (theme.resolved() === 'light' ? 'oscuro' : 'claro')"
        >
          @if (theme.resolved() === 'light') {
            <ngx-icon collection="solar" icon="moon-linear" width="20" height="20" />
          } @else {
            <ngx-icon collection="solar" icon="sun-linear" width="20" height="20" />
          }
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer
    class="bg-base-100/50 border-t border-base-content/5 py-4 px-4 transition-colors duration-300"
  >
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 text-[10px] sm:text-xs text-base-content/30 font-medium">
      <span>Festivos Colombianos &mdash; Ley 51 de 1983 (Ley Emiliani)</span>
      <span>Hecho con 🇨🇴 en Colombia</span>
    </div>
  </footer>
</div>
